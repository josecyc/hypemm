# Optimized + Hurst gate — lowest drawdown variant
# Adds rolling Hurst exponent gate: halts pair when spread is trending (H > 0.55)
# OOS: SR 2.24, $270K net, $45K max DD, DSR 81%

[strategy]
lookback_hours = 48
entry_z = 2.5
exit_z = 0.5
max_hold_hours = 36
stop_loss_z = 4.0
notional_per_leg = 50_000
cost_per_side_bps = 2.0
cooldown_hours = 2
corr_window_hours = 168
corr_threshold = 0.7
hurst_window_hours = 168
hurst_threshold = 0.55
progress_exit_hours = 12
progress_exit_pct = 0.10

[[strategy.pairs]]
coin_a = "LINK"
coin_b = "SOL"

[[strategy.pairs]]
coin_a = "DOGE"
coin_b = "AVAX"

[[strategy.pairs]]
coin_a = "SOL"
coin_b = "AVAX"

[[strategy.pairs]]
coin_a = "DOGE"
coin_b = "ADA"

[infra]
rest_url = "https://api.hyperliquid.xyz/info"
rate_limit_sec = 0.7
poll_interval_sec = 60
data_dir = "data"

[gates]
min_sharpe = 1.0
min_high_corr_pct = 65
max_breakdown_hours = 336
min_easy_pairs = 3
depth_bps_levels = [2, 5, 10, 25, 50]
ob_snapshot_interval_sec = 300
ob_collection_duration_sec = 7200

[sweep]
lookbacks = [24, 48, 72]
entry_zs = [1.5, 2.0, 2.5]
