# Testnet smoke-test config.
# Smaller notional than mainnet so a single drip from the testnet faucet covers
# many trades. Drops LINK/SOL because LINK isn't on Hyperliquid testnet —
# the remaining 3 pairs exercise the same code paths.

[strategy]
lookback_hours = 48
entry_z = 2.5
exit_z = 0.5
max_hold_hours = 36
stop_loss_z = 4.0
notional_per_leg = 200        # well above HL $10/leg min after rounding; 3 pairs x 2 legs @ 5x = $240 max margin
cost_per_side_bps = 2.0
cooldown_hours = 2
corr_window_hours = 168
corr_threshold = 0.7
progress_exit_hours = 12
progress_exit_pct = 0.10

[[strategy.pairs]]
coin_a = "LINK"
coin_b = "SOL"

[[strategy.pairs]]
coin_a = "DOGE"
coin_b = "AVAX"

[[strategy.pairs]]
coin_a = "SOL"
coin_b = "AVAX"

[[strategy.pairs]]
coin_a = "DOGE"
coin_b = "ADA"

[infra]
# Testnet base URL — the LiveExecutionAdapter strips /info if present and uses
# api.hyperliquid-testnet.xyz so the source byte switches to "b" automatically.
rest_url = "https://api.hyperliquid-testnet.xyz/info"
rate_limit_sec = 0.7
poll_interval_sec = 60
data_dir = "data/paper_testnet"
leverage = 5
is_cross_margin = true
max_slippage_bps = 25.0       # testnet books are thin; loosen vs 5 bps prod
ioc_aggression_bps = 30.0
fill_poll_seconds = 0.5
fill_timeout_seconds = 30.0

[gates]
min_sharpe = 1.0
min_high_corr_pct = 65
max_breakdown_hours = 336
min_easy_pairs = 3
depth_bps_levels = [2, 5, 10, 25, 50]
ob_snapshot_interval_sec = 300
ob_collection_duration_sec = 7200

[sweep]
lookbacks = [24, 48, 72]
entry_zs = [1.5, 2.0, 2.5]

# Scaled-down risk thresholds matching the smaller notional ($200/leg).
[risk]
unrealized_warn = -40.0
unrealized_halt = -60.0
daily_loss_halt = -20.0
win_rate_window = 30
win_rate_warn = 0.55
win_rate_min_trades = 10
time_stop_window = 20
time_stop_warn_pct = 0.30
time_stop_min_trades = 10
corr_warn_threshold = 0.65
