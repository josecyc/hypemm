# Optimized strategy — walk-forward validated on 6 years OOS
# 4 pairs (drop BTC/SOL, add DOGE/ADA), entry 2.5, max hold 36h, progress-exit
# OOS: SR 2.11, $284K net, $42K max DD, DSR 77%, profitable in bear markets

[strategy]
lookback_hours = 48
entry_z = 2.5
exit_z = 0.5
max_hold_hours = 36
stop_loss_z = 4.0
notional_per_leg = 50_000
# Fee = HL maker fee (2 bps). Slippage default 0 because:
#   - Backtest validates strategy at hourly mids → no slippage to model
#   - Paper trading fills at HL mid via fetch_mid → 0 actual slippage
#   - Live trading: real fills already include spread, CLI auto-zeros slippage
# To project mainnet P&L impact of spread crossing, run a backtest with
# slippage_per_side_bps = 3 (calibrated 2026-04-26: 1 bps slip ≈ -$20/trade
# at $50K notional, so 3 bps ≈ -$60/trade or ~14% of optimized's $425/trade).
cost_per_side_bps = 2.0
slippage_per_side_bps = 0.0
cooldown_hours = 2
corr_window_hours = 168
corr_threshold = 0.7
progress_exit_hours = 12
progress_exit_pct = 0.10

[[strategy.pairs]]
coin_a = "LINK"
coin_b = "SOL"

[[strategy.pairs]]
coin_a = "DOGE"
coin_b = "AVAX"

[[strategy.pairs]]
coin_a = "SOL"
coin_b = "AVAX"

[[strategy.pairs]]
coin_a = "DOGE"
coin_b = "ADA"

[infra]
rest_url = "https://api.hyperliquid.xyz/info"
rate_limit_sec = 0.7
poll_interval_sec = 60
data_dir = "data"

[gates]
min_sharpe = 1.0
min_high_corr_pct = 65
max_breakdown_hours = 336
min_easy_pairs = 3
depth_bps_levels = [2, 5, 10, 25, 50]
ob_snapshot_interval_sec = 300
ob_collection_duration_sec = 7200

[sweep]
lookbacks = [24, 48, 72]
entry_zs = [1.5, 2.0, 2.5]

# Portfolio-level kill switches and drift detection.
# Thresholds calibrated against the backtest's -$19,657 worst concurrent
# unrealized loss (THESIS section 5.3.8). HALT signals block new entries;
# existing positions are managed by the engine's exit logic.
[risk]
unrealized_warn = -10_000.0      # warn when concurrent unrealized below this
unrealized_halt = -15_000.0      # halt new entries
daily_loss_halt = -5_000.0       # halt entries if 24h realized below this
win_rate_window = 30
win_rate_warn = 0.55
win_rate_min_trades = 10
time_stop_window = 20
time_stop_warn_pct = 0.30
time_stop_min_trades = 10
corr_warn_threshold = 0.65       # warn if active pair corr drops below this
